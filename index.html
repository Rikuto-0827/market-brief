<!-- ══ APP LOGIC ══ -->
<script>
(function(){
  const charts = {};

  function pct(p){ return (p>0?'+':'')+p.toFixed(2)+'%'; }
  function arrow(d){ return d==='up'?'▲':d==='down'?'▼':'—'; }
  function cls(d){ return d==='up'?'up':d==='down'?'down':'flat'; }

  /* ── Build Tabs ── */
  function buildTabs(){
    const nav = document.getElementById('tab-nav-inner');
    const sorted = [...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date));
    sorted.forEach((r,i)=>{
      const d = new Date(r.date+'T12:00:00');
      const btn = document.createElement('button');
      btn.className='tab-btn'+(i===0?' active':'');
      btn.dataset.date=r.date;
      btn.innerHTML=`${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}<span class="dow">${d.toLocaleDateString('en-US',{weekday:'short'})}</span>`;
      btn.onclick=()=>activate(r.date);
      nav.appendChild(btn);
    });
  }

  function activate(date){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.date===date));
    document.querySelectorAll('.report-panel').forEach(p=>p.classList.toggle('active',p.dataset.date===date));
    if(!charts[date]) setTimeout(()=>renderCharts(date),50);
  }

  /* ── Build All Panels ── */
  function buildPanels(){
    const main=document.getElementById('main-content');
    const sorted=[...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date));
    sorted.forEach((r,i)=>{
      const div=document.createElement('div');
      div.className='report-panel'+(i===0?' active':'');
      div.dataset.date=r.date;
      div.innerHTML=html(r);
      main.appendChild(div);
    });
  }

  function html(r){
    /* Index cards */
    const idxHtml=Object.values(r.indices).map(x=>`
      <div class="idx-card ${cls(x.dir)}">
        <div class="idx-name">${x.flag} ${x.name}</div>
        <div class="idx-val">${x.value.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</div>
        <div class="idx-chg c-${cls(x.dir)}">${arrow(x.dir)} ${pct(x.pct)}&ensp;(${x.change>0?'+':''}${x.change.toFixed(1)})</div>
      </div>`).join('');

    /* Macro */
    const macroHtml=Object.entries(r.macro).map(([k,v])=>`
      <div class="macro-item">
        <span class="macro-lbl">${k}</span>
        <span class="macro-val ${v.dir==='up'?'up':v.dir==='down'?'down':''}">${v.value}</span>
      </div>`).join('');

    /* Movers list */
    const moversHtml=r.movers.map(m=>`
      <div class="mover-row">
        <div class="mover-ticker">${m.ticker}</div>
        <div class="mover-info">
          <div class="mover-name">${m.name}</div>
          <div class="mover-why">${m.why}</div>
        </div>
        <div class="mover-pct ${m.dir==='up'?'up':'down'}">${arrow(m.dir)}${Math.abs(m.pct).toFixed(1)}%</div>
      </div>`).join('');

    /* Events */
    const evHtml=r.events.map(e=>`
      <div class="ev-item">
        <div class="ev-title">${e.icon}&ensp;${e.title}</div>
        <div class="ev-detail">${e.detail}</div>
      </div>`).join('');

    /* US deals */
    const usDeals=r.usCredit.deals.map(d=>`
      <div class="deal">
        <div class="deal-tag ${d.tagCls}">${d.tag}</div>
        <div class="deal-ttl">${d.title}</div>
        <div class="deal-meta">${d.meta}</div>
        <div class="deal-body">${d.body}</div>
        <div class="deal-sig">${d.sig}</div>
      </div>`).join('');

    /* JP deals */
    const jpDeals=r.jpCredit.deals.map(d=>`
      <div class="deal">
        <div class="deal-tag ${d.tagCls}">${d.tag}</div>
        <div class="deal-ttl">${d.title}</div>
        <div class="deal-meta">${d.meta}</div>
        <div class="deal-body">${d.body}</div>
        <div class="deal-sig">${d.sig}</div>
      </div>`).join('');

    /* Historical data for this date's charts */
    const sorted=[...MARKET_REPORTS].sort((a,b)=>a.date.localeCompare(b.date));
    const hLabels=JSON.stringify(sorted.map(x=>x.dateLabel));
    const hSP=JSON.stringify(sorted.map(x=>x.indices.sp500.pct));
    const hNQ=JSON.stringify(sorted.map(x=>x.indices.nasdaq.pct));
    const hDow=JSON.stringify(sorted.map(x=>x.indices.dow.pct));
    const mData=JSON.stringify(r.movers);

    return `
    <div class="section">
      <div class="sec-title">📊 主要指数 / Major Indices</div>
      <div class="idx-grid">${idxHtml}</div>
    </div>

    <div class="section">
      <div class="two-col">
        <div class="card">
          <div class="card-title">📈 指数トレンド（日次変動率%）</div>
          <div class="chart-wrap"><canvas id="tc-${r.date}"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">🌐 マクロ指標</div>
          <div class="macro-grid">${macroHtml}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="movers-card">
        <div class="card-title">🔥 プレマーケット注目銘柄 / Pre-Market Movers</div>
        <div class="movers-layout">
          <div class="chart-wrap" style="height:220px"><canvas id="mc-${r.date}"></canvas></div>
          <div>${moversHtml}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📅 本日の注目イベント</div>
      <div class="events-list">${evHtml}</div>
    </div>

    <div class="section">
      <div class="sec-title">💼 US プライベートクレジット &amp; PE</div>
      <div class="pc-box us-box">
        <div class="pc-hdr"><span class="pc-flag">🇺🇸</span>
          <div><div class="pc-name">US Private Credit &amp; PE</div>
          <div class="pc-sub">Direct Lending / Specialty Finance / AI Infrastructure</div></div>
        </div>
        <div class="pc-summary">${r.usCredit.summary}</div>
        <div class="deals-grid">${usDeals}</div>
        <div class="pc-outlook">${r.usCredit.outlook}</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">🗾 Japan プライベートクレジット &amp; PE</div>
      <div class="pc-box jp-box">
        <div class="pc-hdr"><span class="pc-flag">🇯🇵</span>
          <div><div class="pc-name">Japan Private Credit &amp; PE</div>
          <div class="pc-sub">バイアウト / メザニン / TOBストラクチャリング</div></div>
        </div>
        <div class="pc-summary">${r.jpCredit.summary}</div>
        <div class="deals-grid">${jpDeals}</div>
        <div class="pc-outlook">${r.jpCredit.outlook}</div>
      </div>
    </div>

    <div class="section">
      <div class="takeaway">
        <div class="takeaway-lbl">💡 Today's Takeaway</div>
        <div class="takeaway-txt">${r.takeaway}</div>
      </div>
    </div>

    <script>
      window.__cd=window.__cd||{};
      window.__cd['${r.date}']={hl:${hLabels},sp:${hSP},nq:${hNQ},dw:${hDow},mv:${mData}};
    <\/script>`;
  }

  /* ── Charts ── */
  function renderCharts(date){
    charts[date]=1;
    const d=window.__cd&&window.__cd[date];
    if(!d)return;

    /* Trend */
    const tc=document.getElementById('tc-'+date);
    if(tc) new Chart(tc,{type:'line',data:{
      labels:d.hl,
      datasets:[
        {label:'S&P 500', data:d.sp,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.4,pointRadius:5,pointHoverRadius:7},
        {label:'Nasdaq',  data:d.nq,borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.08)',tension:.4,pointRadius:5,pointHoverRadius:7},
        {label:'Dow',     data:d.dw,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',tension:.4,pointRadius:5,pointHoverRadius:7}
      ]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11},boxWidth:12,padding:12}}},
      scales:{
        y:{ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'#f1f5f9'}},
        x:{ticks:{font:{size:11}},grid:{display:false}}
      }
    }});

    /* Movers bar */
    const mc=document.getElementById('mc-'+date);
    if(mc&&d.mv){
      const sorted=[...d.mv].sort((a,b)=>a.pct-b.pct);
      new Chart(mc,{type:'bar',data:{
        labels:sorted.map(m=>m.ticker),
        datasets:[{
          data:sorted.map(m=>m.pct),
          backgroundColor:sorted.map(m=>m.dir==='up'?'rgba(16,185,129,.75)':'rgba(239,68,68,.75)'),
          borderColor:sorted.map(m=>m.dir==='up'?'#10b981':'#ef4444'),
          borderWidth:1,borderRadius:5
        }]
      },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toFixed(1)+'%'}}},
        scales:{
          x:{ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'#f1f5f9'}},
          y:{ticks:{font:{size:11,weight:'700'}},grid:{display:false}}
        }
      }});
    }
  }

  /* ── Init ── */
  buildTabs();
  buildPanels();
  const latest=[...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date))[0].date;
  setTimeout(()=>renderCharts(latest),100);
})();
</script>
</body>
</html>
