        downside: "争奪戦による価格つり上げでエントリーバリュエーションがさらに上昇しリターンが圧迫されるリスク。特別委員会の『中立』転換により意思決定の長期化・不透明感が増しており、最終的に案件が不成立となるリスクも残る。",
        valuation: "$4.12B評価はネットメディア・データプラットフォームとして一般的なEV/EBITDA水準を上回る可能性が高く、AIデータ活用による将来収益化ポテンシャルへの高い期待が織り込まれている。KDDI支持による3,500円までの上乗せが実現すれば評価額はさらに切り上がる。"
      }
    }
  }
];
// ── END_DATA ──
</script>

<!-- ══ APP LOGIC ══ -->
<script>
(function(){
  const charts = {};

  function pct(p){ return (p>0?'+':'')+p.toFixed(2)+'%'; }
  function arrow(d){ return d==='up'?'▲':d==='down'?'▼':'—'; }
  function cls(d){ return d==='up'?'up':d==='down'?'down':'flat'; }

  /* ── Build Tabs ── */
  function buildTabs(){
    const nav = document.getElementById('tab-nav-inner');
    const sorted = [...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date));
    sorted.forEach((r,i)=>{
      const d = new Date(r.date+'T12:00:00');
      const btn = document.createElement('button');
      btn.className='tab-btn'+(i===0?' active':'');
      btn.dataset.date=r.date;
      btn.innerHTML=`${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}<span class="dow">${d.toLocaleDateString('en-US',{weekday:'short'})}</span>`;
      btn.onclick=()=>activate(r.date);
      nav.appendChild(btn);
    });
  }

  function activate(date){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.date===date));
    document.querySelectorAll('.report-panel').forEach(p=>p.classList.toggle('active',p.dataset.date===date));
    if(!charts[date]) setTimeout(()=>renderCharts(date),50);
    updateTokenInfo(date);
  }

  /* ── Token usage footer note ── */
  function updateTokenInfo(date){
    const el = document.getElementById('token-info');
    if(!el) return;
    const r = MARKET_REPORTS.find(x=>x.date===date);
    if(!r || !r.tokenEstimate){ el.textContent=''; return; }
    el.textContent = `この日の更新の概算トークン使用量: 約${r.tokenEstimate.toLocaleString()}トークン（推定値・実測ではありません）｜ Claude Proの使用上限は非公開のため上限との割合は算出できません`;
  }

  /* ── Build All Panels ── */
  function buildPanels(){
    const main=document.getElementById('main-content');
    const sorted=[...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date));
    sorted.forEach((r,i)=>{
      const div=document.createElement('div');
      div.className='report-panel'+(i===0?' active':'');
      div.dataset.date=r.date;
      div.innerHTML=html(r);
      main.appendChild(div);
    });
  }

  function html(r){
    /* Index cards */
    const idxHtml=Object.values(r.indices).map(x=>`
      <div class="idx-card ${cls(x.dir)}">
        <div class="idx-name">${x.flag} ${x.name}</div>
        <div class="idx-val">${x.value.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</div>
        <div class="idx-chg c-${cls(x.dir)}">${arrow(x.dir)} ${pct(x.pct)}&ensp;(${x.change>0?'+':''}${x.change.toFixed(1)})</div>
      </div>`).join('');

    /* Macro */
    const macroHtml=Object.entries(r.macro).map(([k,v])=>`
      <div class="macro-item">
        <span class="macro-lbl">${k}</span>
        <span class="macro-val ${v.dir==='up'?'up':v.dir==='down'?'down':''}">${v.value}</span>
      </div>`).join('');

    /* Movers list */
    const moversHtml=r.movers.map(m=>`
      <div class="mover-row">
        <div class="mover-ticker"><a href="https://finance.yahoo.com/quote/${m.ticker}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px dashed #94a3b8">${m.ticker}</a></div>
        <div class="mover-info">
          <div class="mover-name">${m.name}</div>
          <div class="mover-why">${m.why}</div>
        </div>
        <div class="mover-pct ${m.dir==='up'?'up':'down'}">${arrow(m.dir)}${Math.abs(m.pct).toFixed(1)}%</div>
      </div>`).join('');

    /* Events */
    const evHtml=r.events.map(e=>{
      const sk=encodeURIComponent(e.searchKey||e.title.replace(/[^\x00-\x7F]/g,' ').replace(/\s+/g,' ').trim());
      return `
      <div class="ev-item">
        <div class="ev-title">${e.icon}&ensp;${e.title}</div>
        <div class="ev-detail">${e.detail}</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <a href="https://www.wsj.com/search?query=${sk}" target="_blank" class="ev-link ev-link-wsj">📰 WSJ →</a>
          <a href="https://www.ft.com/search?q=${sk}" target="_blank" class="ev-link ev-link-ft">📰 FT →</a>
          <a href="https://news.google.com/search?q=${sk}&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="ev-link ev-link-jp">🇯🇵 日本語ニュース →</a>
        </div>
      </div>`;
    }).join('');

    /* US deals */
    const usDeals=r.usCredit.deals.map(d=>{
      const sk=encodeURIComponent(d.searchKey||(d.meta?d.meta.split('｜')[0].trim():'private credit'));
      return `
      <div class="deal">
        <div class="deal-tag ${d.tagCls}">${d.tag}</div>
        <div class="deal-ttl">${d.title}</div>
        <div class="deal-meta">${d.meta}</div>
        <div class="deal-body">${d.body}</div>
        <div class="deal-sig">${d.sig}</div>
        <div class="deal-links">
          ${d.url?`<a href="${d.url}" target="_blank" class="deal-link dl-src">🔗 Source</a>`:''}
          <a href="https://www.wsj.com/search?query=${sk}" target="_blank" class="deal-link dl-wsj">📰 WSJ</a>
          <a href="https://www.ft.com/search?q=${sk}" target="_blank" class="deal-link dl-ft">📰 FT</a>
          <a href="https://news.google.com/search?q=${sk}&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="deal-link dl-jp">🇯🇵 日本語ニュース</a>
        </div>
      </div>`;
    }).join('');

    /* JP deals */
    const jpDeals=r.jpCredit.deals.map(d=>{
      const sk=encodeURIComponent(d.searchKey||(d.meta?d.meta.split('｜')[0].trim():'Japan private equity'));
      return `
      <div class="deal">
        <div class="deal-tag ${d.tagCls}">${d.tag}</div>
        <div class="deal-ttl">${d.title}</div>
        <div class="deal-meta">${d.meta}</div>
        <div class="deal-body">${d.body}</div>
        <div class="deal-sig">${d.sig}</div>
        <div class="deal-links">
          ${d.url?`<a href="${d.url}" target="_blank" class="deal-link dl-src">🔗 Source</a>`:''}
          <a href="https://www.wsj.com/search?query=${sk}" target="_blank" class="deal-link dl-wsj">📰 WSJ</a>
          <a href="https://www.dealstreetasia.com/?s=${sk}" target="_blank" class="deal-link dl-dst">🌏 DealStreet</a>
          <a href="https://news.google.com/search?q=${sk}&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="deal-link dl-jp">🇯🇵 日本語ニュース</a>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="section">
      <div class="sec-title">📊 主要指数 / Major Indices</div>
      <div class="idx-grid">${idxHtml}</div>
    </div>

    <div class="section">
      <div class="two-col">
        <div class="card">
          <div class="card-title">📈 指数トレンド（日次変動率%）</div>
          <div class="chart-wrap"><canvas id="tc-${r.date}"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">🌐 マクロ指標</div>
          <div class="macro-grid">${macroHtml}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="movers-card">
        <div class="card-title">🔥 プレマーケット注目銘柄 / Pre-Market Movers</div>
        <div class="movers-layout">
          <div class="chart-wrap" style="height:220px"><canvas id="mc-${r.date}"></canvas></div>
          <div>${moversHtml}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📅 本日の注目イベント</div>
      <div class="events-list">${evHtml}</div>
    </div>

    <div class="section">
      <div class="sec-title">💼 US プライベートクレジット &amp; PE</div>
      <div class="pc-box us-box">
        <div class="pc-hdr"><span class="pc-flag">🇺🇸</span>
          <div><div class="pc-name">US Private Credit &amp; PE</div>
          <div class="pc-sub">Direct Lending / Specialty Finance / AI Infrastructure</div></div>
        </div>
        <div class="pc-summary">${r.usCredit.summary}</div>
        <div class="deals-grid">${usDeals}</div>
        <div class="pc-outlook">${r.usCredit.outlook}</div>
        <div class="pe-news-links">
          <span>📰 情報源:</span>
          <a href="https://www.privateequityinternational.com/" target="_blank" class="pe-news-btn">PEI</a>
          <a href="https://pitchbook.com/news/articles" target="_blank" class="pe-news-btn">PitchBook</a>
          <a href="https://www.withintelligence.com/" target="_blank" class="pe-news-btn">WithIntelligence</a>
          <a href="https://news.google.com/search?q=private+credit+direct+lending+2026&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="pe-news-btn">🔍 PC最新ニュース</a>
          <a href="https://news.google.com/search?q=private+equity+buyout+fund+raise+2026&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="pe-news-btn">🔍 PE最新ニュース</a>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">🗾 Japan プライベートクレジット &amp; PE</div>
      <div class="pc-box jp-box">
        <div class="pc-hdr"><span class="pc-flag">🇯🇵</span>
          <div><div class="pc-name">Japan Private Credit &amp; PE</div>
          <div class="pc-sub">バイアウト / メザニン / TOBストラクチャリング</div></div>
        </div>
        <div class="pc-summary">${r.jpCredit.summary}</div>
        <div class="deals-grid">${jpDeals}</div>
        <div class="pc-outlook">${r.jpCredit.outlook}</div>
        <div class="pe-news-links">
          <span>📰 情報源:</span>
          <a href="https://www.dealstreetasia.com/stories/japan" target="_blank" class="pe-news-btn">DealStreet Asia</a>
          <a href="https://www.bain.com/insights/topics/private-equity/" target="_blank" class="pe-news-btn">Bain PE</a>
          <a href="https://www.financierworldwide.com/qa-japanese-ma-in-2026" target="_blank" class="pe-news-btn">Japan M&A 2026</a>
          <a href="https://news.google.com/search?q=%E6%97%A5%E6%9C%AC+%E3%83%97%E3%83%A9%E3%82%A4%E3%83%99%E3%83%BC%E3%83%88%E3%82%A8%E3%82%AF%E3%82%A4%E3%83%86%E3%82%A3+2026&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="pe-news-btn">🔍 日本PEニュース</a>
          <a href="https://news.google.com/search?q=%E6%97%A5%E6%9C%ACTOB+%E3%83%90%E3%82%A4%E3%82%A2%E3%82%A6%E3%83%88+2026&hl=ja&gl=JP&ceid=JP:ja" target="_blank" class="pe-news-btn">🔍 TOB/M&A</a>
        </div>
      </div>
    </div>

    ${r.narrative?`
    <div class="section">
      <div class="sec-title">📖 マーケットナラティブ — 今日の市場を読む</div>
      <div class="narrative-box">${r.narrative.split('||').map(p=>`<p>${p.trim()}</p>`).join('')}</div>
    </div>`:''}

    ${r.peTraining?`
    <div class="section">
      <div class="sec-title">🎯 PE実力養成 — 今日の市場をどう語るか</div>
      <div class="pet-summary">
        <div class="pet-summary-lbl">⏱ 30秒で説明するなら</div>
        <div class="pet-summary-txt">${r.peTraining.thirtySecSummary}</div>
      </div>
      <div class="pet-grid">
        <div class="pet-card">
          <div class="pet-card-hdr" style="color:#3b82f6">💬 面接想定Q&amp;A</div>
          ${r.peTraining.interviewQA.map(qa=>`
          <div class="qa-item">
            <div class="qa-q">${qa.q}</div>
            <div class="qa-a">${qa.a}</div>
          </div>`).join('')}
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="pet-card">
            <div class="pet-card-hdr" style="color:#8b5cf6">📚 今日のキーコンセプト：${r.peTraining.keyConceptToday.term}</div>
            <div class="concept-items">
              <div class="concept-item"><div class="concept-lbl">定義</div><div class="concept-val">${r.peTraining.keyConceptToday.definition}</div></div>
              <div class="concept-item"><div class="concept-lbl">なぜ生まれたか</div><div class="concept-val">${r.peTraining.keyConceptToday.background}</div></div>
              <div class="concept-item"><div class="concept-lbl">実務での使われ方</div><div class="concept-val">${r.peTraining.keyConceptToday.practical}</div></div>
              <div class="concept-item"><div class="concept-lbl">2026年の文脈</div><div class="concept-val">${r.peTraining.keyConceptToday.context2026}</div></div>
            </div>
          </div>
          <div class="pet-card">
            <div class="pet-card-hdr" style="color:#10b981">🔬 案件分析：${r.peTraining.dealAnalysis.title}</div>
            <div class="da-items">
              <div class="da-item thesis"><div class="da-lbl">投資テーマ</div><div class="da-val">${r.peTraining.dealAnalysis.thesis}</div></div>
              <div class="da-item timing"><div class="da-lbl">なぜ今か</div><div class="da-val">${r.peTraining.dealAnalysis.timing}</div></div>
              <div class="da-item downside"><div class="da-lbl">ダウンサイド</div><div class="da-val">${r.peTraining.dealAnalysis.downside}</div></div>
              <div class="da-item valuation"><div class="da-lbl">バリュエーション</div><div class="da-val">${r.peTraining.dealAnalysis.valuation}</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`:''}

    <div class="section">
      <div class="takeaway">
        <div class="takeaway-lbl">💡 Today's Takeaway</div>
        <div class="takeaway-txt">${r.takeaway}</div>
      </div>
    </div>

    `;
  }

  /* ── Charts ── */
  function renderCharts(date){
    charts[date]=1;
    const d=window.__cd&&window.__cd[date];
    if(!d)return;

    /* Trend */
    const tc=document.getElementById('tc-'+date);
    if(tc) new Chart(tc,{type:'line',data:{
      labels:d.hl,
      datasets:[
        {label:'S&P 500', data:d.sp,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',tension:.4,pointRadius:5,pointHoverRadius:7},
        {label:'Nasdaq',  data:d.nq,borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,.08)',tension:.4,pointRadius:5,pointHoverRadius:7},
        {label:'Dow',     data:d.dw,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',tension:.4,pointRadius:5,pointHoverRadius:7}
      ]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11},boxWidth:12,padding:12}}},
      scales:{
        y:{ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'#f1f5f9'}},
        x:{ticks:{font:{size:11}},grid:{display:false}}
      }
    }});

    /* Movers bar */
    const mc=document.getElementById('mc-'+date);
    if(mc&&d.mv){
      const sorted=[...d.mv].sort((a,b)=>a.pct-b.pct);
      new Chart(mc,{type:'bar',data:{
        labels:sorted.map(m=>m.ticker),
        datasets:[{
          data:sorted.map(m=>m.pct),
          backgroundColor:sorted.map(m=>m.dir==='up'?'rgba(16,185,129,.75)':'rgba(239,68,68,.75)'),
          borderColor:sorted.map(m=>m.dir==='up'?'#10b981':'#ef4444'),
          borderWidth:1,borderRadius:5
        }]
      },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.toFixed(1)+'%'}}},
        scales:{
          x:{ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'#f1f5f9'}},
          y:{ticks:{font:{size:11,weight:'700'}},grid:{display:false}}
        }
      }});
    }
  }

  /* ── Prepare Chart Data (must run before buildPanels) ── */
  function prepareChartData(){
    window.__cd = window.__cd || {};
    const sorted = [...MARKET_REPORTS].sort((a,b)=>a.date.localeCompare(b.date));
    const hLabels = sorted.map(x=>x.dateLabel);
    const hSP  = sorted.map(x=>x.indices.sp500.pct);
    const hNQ  = sorted.map(x=>x.indices.nasdaq.pct);
    const hDow = sorted.map(x=>x.indices.dow.pct);
    MARKET_REPORTS.forEach(r=>{
      window.__cd[r.date]={hl:hLabels,sp:hSP,nq:hNQ,dw:hDow,mv:r.movers};
    });
  }

  /* ── Init ── */
  prepareChartData();
  buildTabs();
  buildPanels();
  const latest=[...MARKET_REPORTS].sort((a,b)=>b.date.localeCompare(a.date))[0].date;
  setTimeout(()=>renderCharts(latest),100);
  updateTokenInfo(latest);
})();
</script>
</body>
</html>
